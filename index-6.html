<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Уляна Павлік — Галерея</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#faf8f5;color:#2c2416;font-family:Georgia,serif;}
header{background:#fff;border-bottom:1px solid #e0d5c5;text-align:center;padding:44px 20px 32px}
.orn{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:18px}
.orl{flex:1;max-width:70px;height:1px;background:linear-gradient(to right,transparent,#b8934a)}
.orr{flex:1;max-width:70px;height:1px;background:linear-gradient(to left,transparent,#b8934a)}
.ord{width:5px;height:5px;background:#b8934a;transform:rotate(45deg)}
h1{font-size:clamp(1.8rem,7vw,3.5rem);font-weight:normal;letter-spacing:.08em}
h1 em{color:#b8934a;font-style:italic}
.hsub{font-size:.55rem;letter-spacing:.32em;color:#9a8060;text-transform:uppercase;margin-top:6px}
.hinfo{font-size:.52rem;letter-spacing:.14em;color:#c0b09a;text-transform:uppercase;margin-top:16px}
.gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:3px;
  padding:3px;
  background:#e0d5c5;
  max-width:1200px;
  margin:0 auto;
}
@media(max-width:480px){.gallery{grid-template-columns:repeat(2,1fr)}}
@media(min-width:900px){.gallery{grid-template-columns:repeat(4,1fr)}}
.card{background:#fff;cursor:pointer;overflow:hidden}
.card:active{opacity:.85}
.img-w{aspect-ratio:1;overflow:hidden;background:#f2ede6;display:flex;align-items:center;justify-content:center}
.img-w img{max-width:100%;max-height:100%;object-fit:contain;display:block;padding:6px}
.card-b{padding:8px 10px 10px;border-top:1px solid #f0e8dc}
.ct{font-style:italic;font-size:.82rem;color:#2c2416;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cy{font-size:.42rem;letter-spacing:.14em;color:#b8934a;text-transform:uppercase;margin-top:2px}

/* MODAL */
#modal{display:none;position:fixed;inset:0;background:rgba(250,248,245,.97);z-index:100;overflow-y:auto}
#modal.open{display:block}
.mwrap{max-width:560px;margin:0 auto;padding:64px 16px 40px}
.mimg-w{background:#f2ede6;padding:20px;text-align:center;margin-bottom:0}
.mimg-w img{max-width:100%;max-height:70vh;object-fit:contain;display:block;margin:0 auto;box-shadow:0 6px 24px rgba(44,36,22,.12)}
.mbody{background:#fff;border:1px solid #e0d5c5;padding:20px}
.mnum{font-size:.42rem;letter-spacing:.28em;color:#b8934a;text-transform:uppercase;margin-bottom:6px}
.mtitle{font-style:italic;font-size:clamp(1.3rem,5vw,1.8rem);font-weight:normal}
.myr{font-size:.48rem;letter-spacing:.18em;color:#9a8060;text-transform:uppercase;margin-top:4px;margin-bottom:14px}
.mdiv{width:20px;height:1px;background:#b8934a;margin-bottom:12px}
.mmeta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.mmeta label{font-size:.4rem;letter-spacing:.2em;text-transform:uppercase;color:#b8934a;display:block;margin-bottom:2px}
.mmeta span{font-style:italic;font-size:.85rem}
.mbtn{background:#b8934a;border:none;color:#fff;padding:12px;font-size:.55rem;letter-spacing:.24em;text-transform:uppercase;cursor:pointer;width:100%;font-family:Georgia,serif}
.mcl{position:fixed;top:14px;right:14px;background:#fff;border:1px solid #e0d5c5;width:42px;height:42px;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(44,36,22,.1);z-index:101;color:#2c2416}
.mload{text-align:center;padding:40px;font-size:.6rem;letter-spacing:.2em;color:#b8934a;text-transform:uppercase}

footer{text-align:center;padding:32px 20px;border-top:1px solid #e0d5c5;background:#fff;margin-top:3px}
.ft{font-size:.48rem;letter-spacing:.18em;color:#9a8060;text-transform:uppercase;line-height:2.4}
</style>
</head>

// Build grid from thumbnails only
const g=document.getElementById('gallery');
T.forEach((d,i)=>{
  const c=document.createElement('div');
  c.className='card';
  c.innerHTML=`<div class="img-w"><img src="${d.th}" alt="${d.t}"></div><div class="card-b"><div class="ct">${d.t}</div><div class="cy">${d.y}</div></div>`;
  c.onclick=()=>openM(i);
  g.appendChild(c);
});

// Full images loaded lazily
let fullsLoaded=false;
const fullCache={};

function loadFulls(cb){
  if(fullsLoaded){cb();return;}
  const s=document.createElement('script');
  s.onload=()=>{fullsLoaded=true;cb();};
  s.src='fulls.js';
  document.head.appendChild(s);
}

function openM(i){
  const d=T[i];
  document.getElementById('mnum').textContent='Твір '+(i<9?'0'+(i+1):i+1)+' / 33';
  document.getElementById('mtitle').textContent=d.t;
  document.getElementById('myr').textContent=d.y;
  document.getElementById('mmed').textContent=d.m;
  document.getElementById('msz').textContent=d.s;
  document.getElementById('mimg').style.display='none';
  document.getElementById('mload').style.display='block';
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
  loadFulls(()=>{
    document.getElementById('mimg').src=F[i];
    document.getElementById('mimg').style.display='block';
    document.getElementById('mload').style.display='none';
  });
}
function closeM(){
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
}
document.getElementById('modal').addEventListener('click',function(e){
  if(e.target===this)closeM();
});
</script>
